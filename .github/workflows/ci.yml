name: Validate and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Upload Cloudflare artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          if-no-files-found: error

  github-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  cloudflare-pages:
    name: Deploy to Cloudflare Pages
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Download Cloudflare artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          directory: dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  experience-v2:
    name: Validate and Deploy Experience V2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: experiments/portfolio-experience-v2/package-lock.json

      - name: Install dependencies
        working-directory: experiments/portfolio-experience-v2
        run: npm ci

      - name: Validate
        working-directory: experiments/portfolio-experience-v2
        run: npm run validate

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: experiments/portfolio-experience-v2
          command: >-
            pages deploy dist
            --project-name=evyatar-portfolio-v2
            --branch=preview
            --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
